<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papamoa.info — CRM Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean:       #1B6B7D;
      --ocean-deep:  #134B58;
      --ocean-light: #E8F4F6;
      --dune:        #C4985A;
      --dune-light:  #F5EDD8;
      --sand:        #F7F3ED;
      --border:      #E0D9CE;
      --text:        #2C2C2C;
      --text-mid:    #5A5A5A;
      --text-light:  #8A8A8A;
      --white:       #FFFFFF;
      --green:       #16A34A;
      --green-bg:    #DCFCE7;
      --amber:       #D97706;
      --amber-bg:    #FEF3C7;
      --red:         #DC2626;
      --red-bg:      #FEE2E2;
      --blue:        #2563EB;
      --blue-bg:     #DBEAFE;
      --purple:      #7C3AED;
      --purple-bg:   #EDE9FE;
      --font:        'Figtree', sans-serif;
      --display:     'Playfair Display', serif;
      --radius:      10px;
      --radius-lg:   16px;
      --shadow:      0 2px 8px rgba(0,0,0,0.07);
      --shadow-lg:   0 8px 32px rgba(0,0,0,0.14);
    }

    body {
      font-family: var(--font);
      background: var(--sand);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── TOP BAR ──────────────────────────────────── */
    .topbar {
      background: var(--ocean-deep);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .topbar-logo {
      font-family: var(--display);
      font-size: 18px;
      color: white;
      white-space: nowrap;
    }
    .topbar-logo span { color: var(--dune); }
    .topbar-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.15); }
    .topbar-title { font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }
    .topbar-stat strong { color: white; font-size: 14px; }
    .btn-refresh {
      background: var(--dune);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-refresh:hover { opacity: 0.85; }

    /* ── SETUP BANNER ─────────────────────────────── */
    .setup-banner {
      background: var(--amber-bg);
      border-bottom: 2px solid var(--amber);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--amber);
    }
    .setup-banner strong { font-weight: 700; }
    .setup-banner a { color: var(--amber); font-weight: 600; }
    .setup-banner.hidden { display: none; }

    /* ── CONTROLS ─────────────────────────────────── */
    .controls {
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: white;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }
    .search-wrap input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      background: var(--sand);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--ocean); }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 15px;
    }
    .filter-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      background: var(--sand);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    .filter-select:focus { border-color: var(--ocean); }
    .controls-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .view-btn {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--sand);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.15s;
      line-height: 1;
    }
    .view-btn.active { background: var(--ocean-deep); color: white; border-color: var(--ocean-deep); }
    .results-count { font-size: 12px; color: var(--text-light); white-space: nowrap; }

    /* ── PIPELINE STRIPS ──────────────────────────── */
    .pipeline-bar {
      padding: 10px 24px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid var(--border);
    }
    .pipeline-chip {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .pipeline-chip.all      { background: var(--ocean-deep); color: white; }
    .pipeline-chip.new      { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
    .pipeline-chip.contacted{ background: var(--ocean-light); color: var(--ocean); border-color: var(--ocean); }
    .pipeline-chip.engaged  { background: var(--purple-bg); color: var(--purple); border-color: var(--purple); }
    .pipeline-chip.approved { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
    .pipeline-chip.published{ background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .pipeline-chip.lost     { background: var(--red-bg); color: var(--red); border-color: var(--red); }
    .pipeline-chip:not(.all):not(.active):hover { opacity: 0.75; }
    .pipeline-chip.active   { outline: 2px solid var(--ocean-deep); outline-offset: 2px; }
    .chip-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      background: rgba(0,0,0,0.12);
      margin-left: 5px;
    }

    /* ── MAIN CONTENT ─────────────────────────────── */
    .main { padding: 20px 24px 60px; }

    /* ── LOADING ──────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: var(--text-light);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--ocean);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LEAD GRID ────────────────────────────────── */
    .lead-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .lead-grid.list-view {
      grid-template-columns: 1fr;
      gap: 6px;
    }

    /* ── LEAD CARD ────────────────────────────────── */
    .lead-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .lead-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }
    .lead-card.status-new::before        { background: var(--blue); }
    .lead-card.status-contacted::before  { background: var(--ocean); }
    .lead-card.status-ppp::before        { background: var(--purple); }
    .lead-card.status-engaged::before    { background: var(--purple); }
    .lead-card.status-approved::before   { background: var(--amber); }
    .lead-card.status-invoiced::before   { background: var(--amber); }
    .lead-card.status-paid::before       { background: var(--green); }
    .lead-card.status-published::before  { background: var(--green); }
    .lead-card.status-lost::before       { background: var(--red); }
    .lead-card.status-notnow::before     { background: var(--text-light); }
    .lead-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      border-color: var(--ocean);
    }
    .lead-card.list-view {
      border-radius: var(--radius);
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 180px 100px 130px 1fr auto;
      align-items: center;
      gap: 12px;
    }
    .lead-card.list-view::before { border-radius: var(--radius) 0 0 var(--radius); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .card-id { font-size: 10px; color: var(--text-light); font-weight: 600; font-variant-numeric: tabular-nums; }
    .card-name { font-size: 15px; font-weight: 700; color: var(--ocean-deep); line-height: 1.3; }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-tier-gold     { background: #FEF3C7; color: #B45309; border: 1px solid #FCD34D; }
    .badge-tier-silver   { background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; }
    .badge-cat           { background: var(--ocean-light); color: var(--ocean); }
    .badge-status-new         { background: var(--blue-bg); color: var(--blue); }
    .badge-status-contacted   { background: var(--ocean-light); color: var(--ocean); }
    .badge-status-ppp         { background: var(--purple-bg); color: var(--purple); }
    .badge-status-engaged     { background: var(--purple-bg); color: var(--purple); }
    .badge-status-approved    { background: var(--amber-bg); color: var(--amber); }
    .badge-status-invoiced    { background: var(--amber-bg); color: var(--amber); }
    .badge-status-paid        { background: var(--green-bg); color: var(--green); }
    .badge-status-published   { background: var(--green-bg); color: var(--green); }
    .badge-status-lost        { background: var(--red-bg); color: var(--red); }
    .badge-status-notnow      { background: #F3F4F6; color: #6B7280; }

    .card-contact { font-size: 12px; color: var(--text-mid); margin-bottom: 8px; display: flex; flex-direction: column; gap: 2px; }
    .card-contact span { display: flex; align-items: center; gap: 5px; }
    .card-contact a { color: var(--ocean); text-decoration: none; }
    .card-contact a:hover { text-decoration: underline; }
    .card-icon { font-size: 12px; opacity: 0.6; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .card-sub { font-size: 11px; color: var(--text-light); }
    .card-actions { display: flex; gap: 6px; }
    .card-action-btn {
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .card-action-btn:hover { opacity: 0.75; }
    .btn-edit  { background: var(--ocean-light); color: var(--ocean); }
    .btn-link  { background: var(--dune-light); color: var(--dune); text-decoration: none; display: inline-flex; align-items: center; }

    .card-notes {
      font-size: 11px;
      color: var(--text-light);
      background: var(--sand);
      border-radius: 6px;
      padding: 6px 8px;
      margin-top: 8px;
      line-height: 1.4;
      max-height: 44px;
      overflow: hidden;
    }

    .card-callback {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      background: var(--amber-bg);
      color: var(--amber);
      margin-top: 8px;
    }

    /* ── DETAIL PANEL ─────────────────────────────── */
    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(19,75,88,0.45);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .panel-overlay.open { opacity: 1; pointer-events: all; }

    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 480px;
      max-width: 100vw;
      background: white;
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open { transform: translateX(0); }

    .panel-head {
      background: var(--ocean-deep);
      padding: 20px 24px;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .panel-head-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .panel-id { font-size: 11px; opacity: 0.6; font-weight: 600; margin-bottom: 4px; }
    .panel-name { font-family: var(--display); font-size: 22px; line-height: 1.2; }
    .panel-close {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .panel-close:hover { background: rgba(255,255,255,0.25); }
    .panel-badges { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    .panel-body { padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

    .panel-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 10px;
    }

    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .contact-item { display: flex; flex-direction: column; gap: 2px; }
    .contact-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); }
    .contact-value { font-size: 14px; font-weight: 500; color: var(--text); }
    .contact-value a { color: var(--ocean); text-decoration: none; }
    .contact-value a:hover { text-decoration: underline; }
    .contact-value.empty { color: var(--text-light); font-style: italic; font-size: 12px; }

    .panel-field { display: flex; flex-direction: column; gap: 6px; }
    .panel-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); }
    .panel-field select,
    .panel-field input,
    .panel-field textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--sand);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .panel-field select:focus,
    .panel-field input:focus,
    .panel-field textarea:focus { border-color: var(--ocean); background: white; }

    .panel-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .panel-btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none;
    }
    .panel-btn:hover { opacity: 0.85; }
    .panel-btn:active { transform: scale(0.98); }
    .panel-btn-primary { background: var(--ocean-deep); color: white; }
    .panel-btn-secondary { background: var(--sand); color: var(--text); border: 1.5px solid var(--border); }
    .panel-btn-gold { background: #B45309; color: white; }
    .panel-btn-danger { background: var(--red-bg); color: var(--red); border: 1.5px solid #FCA5A5; }

    .panel-link-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--sand);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .panel-link-row .link-icon { font-size: 18px; }
    .panel-link-row .link-text { flex: 1; }
    .panel-link-row .link-label { font-size: 11px; color: var(--text-light); font-weight: 600; }
    .panel-link-row .link-url { font-size: 12px; color: var(--ocean); word-break: break-all; }
    .panel-link-row a { color: var(--ocean); text-decoration: none; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .panel-link-row a:hover { text-decoration: underline; }

    .save-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ocean-deep);
      color: white;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      z-index: 300;
      transition: transform 0.3s;
      pointer-events: none;
    }
    .save-toast.show { transform: translateX(-50%) translateY(0); }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-light);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-family: var(--display); font-size: 20px; color: var(--text-mid); margin-bottom: 6px; }

    @media (max-width: 600px) {
      .controls { padding: 12px; }
      .main { padding: 12px; }
      .topbar { padding: 0 14px; }
      .lead-grid { grid-template-columns: 1fr; }
      .detail-panel { width: 100vw; }
      .contact-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">Papamoa<span>.info</span></div>
  <div class="topbar-sep"></div>
  <div class="topbar-title">CRM Dashboard</div>
  <div class="topbar-right">
    <div class="topbar-stat"><span>Leads</span><strong id="stat-total">—</strong></div>
    <div class="topbar-stat"><span>Approved</span><strong id="stat-approved">—</strong></div>
    <div class="topbar-stat"><span>Published</span><strong id="stat-published">—</strong></div>
    <button class="btn-refresh" onclick="loadLeads()">↻ Refresh</button>
  </div>
</div>

<!-- SETUP BANNER -->
<div class="setup-banner" id="setup-banner">
  <strong>⚙️ Setup required:</strong>
  Add your Google Sheet ID and API Key to the CONFIG section at the top of this file.
  <a href="#" onclick="document.getElementById('setup-banner').classList.add('hidden'); return false;">Dismiss</a>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search leads..." oninput="filterLeads()">
  </div>
  <select class="filter-select" id="filter-category" onchange="filterLeads()">
    <option value="">All Categories</option>
    <option>Accommodation</option>
    <option>Activities</option>
    <option>Food & Drink</option>
    <option>Shops</option>
    <option>Services</option>
  </select>
  <select class="filter-select" id="filter-tier" onchange="filterLeads()">
    <option value="">All Tiers</option>
    <option>Gold</option>
    <option>Silver</option>
    <option>Unknown</option>
  </select>
  <select class="filter-select" id="filter-sort" onchange="filterLeads()">
    <option value="id">Sort: ID</option>
    <option value="name">Sort: Name</option>
    <option value="status">Sort: Status</option>
    <option value="callback">Sort: Callback Date</option>
  </select>
  <div class="controls-right">
    <span class="results-count" id="results-count"></span>
    <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grid view">⊞</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')" title="List view">≡</button>
  </div>
</div>

<!-- PIPELINE CHIPS -->
<div class="pipeline-bar" id="pipeline-bar"></div>

<!-- MAIN -->
<div class="main">
  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <div>Loading leads from Google Sheet...</div>
  </div>
  <div class="lead-grid" id="lead-grid" style="display:none;"></div>
</div>

<!-- OVERLAY -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="panel-head">
    <div class="panel-head-top">
      <div>
        <div class="panel-id" id="panel-id"></div>
        <div class="panel-name" id="panel-name"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-badges" id="panel-badges"></div>
  </div>

  <div class="panel-body">

    <!-- Contact Info -->
    <div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — Update these two values
// ═══════════════════════════════════════════════════════
var CONFIG = {
  SHEET_ID:  '1X5i40RLF-r-yLRbm_XCgVyzJAkgO_o6whaoCzdC3SiM',   // The long ID from your Google Sheet URL
  API_KEY:   'AIzaSyDfAgRAciSPyilw5XTa64uCO8WxyAUGLFQ',    // Google Sheets API key (read-only, public sheet)
  SHEET_NAME: 'LEADS',
  // Columns (1-indexed, matching your LEADS tab)
  COL: {
    ID:        1,   // A
    NAME:      2,   // B
    SLUG:      3,   // C
    CONTACT:   4,   // D
    EMAIL:     5,   // E
    PHONE:     6,   // F

    TIER:      10,  // J
    SOURCE:    11,  // K
    STATUS:    12,  // L

    PH_ENQ:    14,  // N

  }
};
// ═══════════════════════════════════════════════════════

var allLeads = [];
var filteredLeads = [];
var currentView = 'grid';
var activeStatus = 'all';
var currentLead = null;

// Status key normaliser
function statusKey(s) {
  if (!s) return 'new';
  var map = {
    'new lead': 'new', 'contacted': 'contacted', 'ppp sent': 'ppp',
    'engaged': 'engaged', 'form submitted': 'engaged',
    'onboarding': 'approved', 'approved': 'approved',
    'invoiced': 'invoiced', 'paid': 'paid', 'published': 'published',
    'not now': 'notnow', 'lost': 'lost', 'wrong fit': 'lost'
  };
  return map[s.toLowerCase()] || 'new';
}

function statusLabel(s) {
  return s || 'New Lead';
}

function badgeClass(s) {
  return 'badge badge-status-' + statusKey(s);
}

// ── LOAD DATA ─────────────────────────────────────────
function loadLeads() {
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') {
    loadDemoData();
    return;
  }

  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('lead-grid').style.display = 'none';
  document.getElementById('setup-banner').classList.add('hidden');

  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + CONFIG.SHEET_ID +
            '/values/' + CONFIG.SHEET_NAME + '!A2:X1000?key=' + CONFIG.API_KEY;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { throw new Error(data.error.message); }
      var rows = data.values || [];
      allLeads = rows.map(function(row, i) {
        return rowToLead(row, i);
      }).filter(function(l) { return l.id; });
      renderAll();
    })
    .catch(function(e) {
      document.getElementById('loading-state').innerHTML =
        '<div style="color:var(--red);">⚠️ Error loading sheet: ' + e.message + '</div>' +
        '<div style="color:var(--text-light);font-size:12px;">Check your Sheet ID, API Key, and that the sheet is publicly readable.</div>';
    });
}

function rowToLead(row, i) {
  var c = CONFIG.COL;
  return {
    rowIndex: i + 2,
    id:        row[c.ID-1]        || '',
    name:      row[c.NAME-1]      || '',
    slug:      row[c.SLUG-1]      || '',
    contact:   row[c.CONTACT-1]   || '',
    email:     row[c.EMAIL-1]     || '',
    phone:     row[c.PHONE-1]     || '',
    website:   row[c.WEBSITE-1]   || '',
    category:  row[c.CATEGORY-1]  || '',
    subcat:    row[c.SUBCAT-1]    || '',
    tier:      row[c.TIER-1]      || '',
    source:    row[c.SOURCE-1]    || '',
    status:    row[c.STATUS-1]    || '',
    phViews:   row[c.PH_VIEWS-1]  || '',
    phEnq:     row[c.PH_ENQ-1]    || '',
    preview:   row[c.PREVIEW-1]   || '',
    callback:  row[c.CALLBACK-1]  || '',
    response:  row[c.RESPONSE-1]  || '',
    notes:     row[c.NOTES-1]     || '',
  };
}

    {rowIndex:4, id:'PPI-093',name:'Karaka Pines Papamoa',slug:'karaka-pines',contact:'Rebecca Lloyd',email:'rebecca@karakapines.co.nz',phone:'027 230 2997',website:'https://karakapines.co.nz',category:'Services',subcat:'Retirement Village',tier:'Gold',source:'',status:'Approved',phViews:'',phEnq:'',preview:'',callback:'',response:'Interested',notes:'Needs first right of return on renewal'},

// ── RENDER ─────────────────────────────────────────────
function renderAll() {
  updateStats();
  buildPipelineBar();
  filterLeads();
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('lead-grid').style.display = '';
}

function updateStats() {
  document.getElementById('stat-total').textContent = allLeads.length;
  document.getElementById('stat-approved').textContent = allLeads.filter(function(l){ return ['approved','invoiced','paid'].includes(statusKey(l.status)); }).length;
  document.getElementById('stat-published').textContent = allLeads.filter(function(l){ return statusKey(l.status) === 'published'; }).length;
}

function buildPipelineBar() {
  var statuses = ['all','New Lead','Contacted','PPP Sent','Engaged','Approved','Published','Lost','Not Now'];
  var labels   = ['All','New','Contacted','PPP Sent','Engaged','Approved','Published','Lost','Not Now'];
  var classes  = ['all','new','contacted','ppp','engaged','approved','published','lost','notnow'];

  var bar = document.getElementById('pipeline-bar');
  bar.innerHTML = '';

  statuses.forEach(function(s, i) {
    var count = s === 'all' ? allLeads.length :
      allLeads.filter(function(l){ return (l.status||'').toLowerCase().includes(s.toLowerCase()); }).length;

    var chip = document.createElement('div');
    chip.className = 'pipeline-chip ' + classes[i] + (activeStatus === (s==='all'?'all':s) ? ' active' : '');
    chip.innerHTML = labels[i] + '<span class="chip-count">' + count + '</span>';
    chip.onclick = (function(status){ return function(){ activeStatus = status; buildPipelineBar(); filterLeads(); }; })(s === 'all' ? 'all' : s);
    bar.appendChild(chip);
  });
}

function filterLeads() {
  var search = document.getElementById('search-input').value.toLowerCase();
  var cat    = document.getElementById('filter-category').value;
  var tier   = document.getElementById('filter-tier').value;
  var sort   = document.getElementById('filter-sort').value;

  filteredLeads = allLeads.filter(function(l) {
    if (activeStatus !== 'all' && !(l.status||'').toLowerCase().includes(activeStatus.toLowerCase())) return false;
    if (cat  && l.category !== cat) return false;
    if (tier && l.tier !== tier) return false;
    if (search) {
      var haystack = [l.id,l.name,l.contact,l.email,l.phone,l.subcat,l.notes].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  filteredLeads.sort(function(a,b) {
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'status') return (a.status||'').localeCompare(b.status||'');
    if (sort === 'callback') return (a.callback||'').localeCompare(b.callback||'');
    return a.id.localeCompare(b.id);
  });

  document.getElementById('results-count').textContent = filteredLeads.length + ' of ' + allLeads.length + ' leads';
  renderGrid();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  renderGrid();
}

function renderGrid() {
  var grid = document.getElementById('lead-grid');
  grid.className = 'lead-grid' + (currentView === 'list' ? ' list-view' : '');

  if (filteredLeads.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>No leads found</h3><p>Try adjusting your filters.</p></div>';
    return;
  }

  grid.innerHTML = '';
  filteredLeads.forEach(function(lead) {
    grid.appendChild(makeCard(lead));
  });
}

function makeCard(lead) {
  var card = document.createElement('div');
  card.className = 'lead-card status-' + statusKey(lead.status) + (currentView === 'list' ? ' list-view' : '');
  card.onclick = function() { openPanel(lead); };

  var tierBadge = lead.tier === 'Gold' ? '<span class="badge badge-tier-gold">⭐ Gold</span>' :
                  lead.tier === 'Silver' ? '<span class="badge badge-tier-silver">Silver</span>' : '';
  var catBadge  = lead.category ? '<span class="badge badge-cat">' + lead.category + '</span>' : '';
  var statusB   = '<span class="' + badgeClass(lead.status) + '">' + (lead.status || 'New Lead') + '</span>';

  var contactHtml = '';
  if (lead.contact) contactHtml += '<span><span class="card-icon">👤</span>' + lead.contact + '</span>';
  if (lead.phone)   contactHtml += '<span><span class="card-icon">📞</span><a href="tel:' + lead.phone + '" onclick="event.stopPropagation()">' + lead.phone + '</a></span>';
  if (lead.email)   contactHtml += '<span><span class="card-icon">✉️</span><a href="mailto:' + lead.email + '" onclick="event.stopPropagation()">' + lead.email + '</a></span>';

  var notesHtml = lead.notes ? '<div class="card-notes">' + lead.notes + '</div>' : '';
  var callbackHtml = lead.callback ? '<div class="card-callback">📅 Callback: ' + lead.callback + '</div>' : '';

  if (currentView === 'list') {
    card.innerHTML =
      '<div><div style="font-weight:700;color:var(--ocean-deep);">' + lead.name + '</div><div style="font-size:11px;color:var(--text-light);">' + lead.id + '</div></div>' +
      '<div>' + statusB + '</div>' +
      '<div style="font-size:12px;color:var(--text-mid);">' + (lead.contact||'—') + '</div>' +
      '<div style="font-size:12px;color:var(--text-mid);">' + (lead.phone ? '<a href="tel:' + lead.phone + '" onclick="event.stopPropagation()" style="color:var(--ocean);text-decoration:none;">' + lead.phone + '</a>' : '') + (lead.email ? ' · <a href="mailto:' + lead.email + '" onclick="event.stopPropagation()" style="color:var(--ocean);text-decoration:none;">' + lead.email + '</a>' : '') + '</div>' +
      '<div style="display:flex;gap:6px;">' + tierBadge + catBadge + '</div>';
  } else {
    card.innerHTML =
      '<div class="card-header">' +
        '<div><div class="card-id">' + lead.id + '</div><div class="card-name">' + lead.name + '</div></div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' + statusB + tierBadge + '</div>' +
      '</div>' +
      '<div class="card-badges">' + catBadge + (lead.subcat ? '<span class="badge" style="background:var(--sand);color:var(--text-mid);">' + lead.subcat + '</span>' : '') + '</div>' +
      '<div class="card-contact">' + contactHtml + '</div>' +
      callbackHtml + notesHtml +
      '<div class="card-footer">' +
        '<span class="card-sub">' + (lead.source || '') + '</span>' +
        '<div class="card-actions">' +
          (lead.website ? '<a class="card-action-btn btn-link" href="' + lead.website + '" target="_blank" onclick="event.stopPropagation()">🌐 Site</a>' : '') +
          (lead.preview ? '<a class="card-action-btn btn-link" href="' + lead.preview + '" target="_blank" onclick="event.stopPropagation()">👁 PPP</a>' : '') +
        '</div>' +
      '</div>';
  }

  return card;
}

// ── DETAIL PANEL ───────────────────────────────────────
function openPanel(lead) {
  currentLead = lead;

  document.getElementById('panel-id').textContent = lead.id;
  document.getElementById('panel-name').textContent = lead.name;

  var badges = '';
  if (lead.tier === 'Gold') badges += '<span class="badge badge-tier-gold">⭐ Gold Spotlight</span>';
  if (lead.tier === 'Silver') badges += '<span class="badge badge-tier-silver">Silver</span>';
  badges += '<span class="' + badgeClass(lead.status) + '">' + (lead.status || 'New Lead') + '</span>';
  if (lead.category) badges += '<span class="badge badge-cat">' + lead.category + (lead.subcat ? ' / ' + lead.subcat : '') + '</span>';
  document.getElementById('panel-badges').innerHTML = badges;

  // Contact
  var contactFields = [
    {label:'Contact Name', value: lead.contact},
    {label:'Phone', value: lead.phone, link: lead.phone ? 'tel:'+lead.phone : ''},
    {label:'Email', value: lead.email, link: lead.email ? 'mailto:'+lead.email : ''},
    {label:'Lead Source', value: lead.source},
    {label:'Placeholder Views', value: lead.phViews ? lead.phViews + ' / mo' : ''},
    {label:'Placeholder Enquiries', value: lead.phEnq ? lead.phEnq + ' / mo' : ''},
  ];
  document.getElementById('panel-contact').innerHTML = contactFields.map(function(f) {
    var val = f.value ? (f.link ? '<a href="'+f.link+'">'+f.value+'</a>' : f.value) : '<span class="empty">Not set</span>';
    return '<div class="contact-item"><div class="contact-label">'+f.label+'</div><div class="contact-value">'+val+'</div></div>';
  }).join('');

  // Links
  var links = [];
  if (lead.website) links.push({icon:'🌐', label:'Website', url: lead.website});
  if (lead.preview) links.push({icon:'👁', label:'PPP Preview', url: lead.preview});
  if (lead.slug) links.push({icon:'📄', label:'Live Listing', url: 'https://papamoa.info/listings/'+lead.slug});

  var linksHtml = links.map(function(l) {
    return '<div class="panel-link-row"><span class="link-icon">'+l.icon+'</span><div class="link-text"><div class="link-label">'+l.label+'</div><div class="link-url">'+l.url+'</div></div><a href="'+l.url+'" target="_blank">Open ↗</a></div>';
  }).join('');
  document.getElementById('panel-links').innerHTML = linksHtml || '<div style="font-size:12px;color:var(--text-light);">No links on this lead yet.</div>';

  // Editable fields
  document.getElementById('edit-status').value   = lead.status || 'New Lead';
  document.getElementById('edit-response').value = lead.response || '';
  document.getElementById('edit-tier').value     = lead.tier || '';
  document.getElementById('edit-notes').value    = lead.notes || '';

  // Convert callback date format dd/mm/yyyy to yyyy-mm-dd for date input
  var cb = lead.callback || '';
  if (cb && cb.includes('/')) {
    var parts = cb.split('/');
    if (parts.length === 3) cb = parts[2] + '-' + parts[1] + '-' + parts[0];
  }
  document.getElementById('edit-callback').value = cb;

  // Quick actions
  document.getElementById('btn-call').href  = lead.phone  ? 'tel:'+lead.phone  : '#';
  document.getElementById('btn-email').href = lead.email  ? 'mailto:'+lead.email : '#';
  document.getElementById('btn-ppp').href   = lead.preview || '#';
  document.getElementById('btn-ppp').style.opacity = lead.preview ? '1' : '0.4';

  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  document.body.style.overflow = '';
  currentLead = null;
}

// ── SAVE ───────────────────────────────────────────────
function saveChanges() {
  if (!currentLead) return;

  // Update local data
  currentLead.status   = document.getElementById('edit-status').value;
  currentLead.response = document.getElementById('edit-response').value;
  currentLead.tier     = document.getElementById('edit-tier').value;
  currentLead.notes    = document.getElementById('edit-notes').value;

  // Convert date back to dd/mm/yyyy
  var cbInput = document.getElementById('edit-callback').value;
  if (cbInput) {
    var parts = cbInput.split('-');
    if (parts.length === 3) cbInput = parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  currentLead.callback = cbInput;

  // If API key is set, update Google Sheet
  if (CONFIG.API_KEY !== 'YOUR_API_KEY_HERE' && CONFIG.SHEET_ID !== 'YOUR_SHEET_ID_HERE') {
    var row = currentLead.rowIndex;
    var c   = CONFIG.COL;
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + CONFIG.SHEET_ID +
              '/values/' + CONFIG.SHEET_NAME + '!L' + row + ':X' + row +
              '?valueInputOption=USER_ENTERED&key=' + CONFIG.API_KEY;

    // Note: write-back requires OAuth2, not just API key
    // For now, show toast and update locally — Phase 2 connect via Apps Script webhook
  }

  showToast('✓ Updated locally — sync to sheet coming in Phase 2');
  renderAll();
  closePanel();
}

function showToast(msg) {
  var toast = document.getElementById('save-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function(){ toast.classList.remove('show'); }, 3000);
}

// ── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePanel();
});

// ── INIT ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  loadLeads();
});
</script>
