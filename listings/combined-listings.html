<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Pages | Papamoa.info</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#2B3F5C;--blue:#3AABDE;--lime:#7DC143;--sand:#F5EFE0;--dune:#D4C4A0;--coral:#E8344A;--white:#FFFFFF;--ink:#0D1B2A;--body:#1E2D3E;--muted:#607080;--border:#DDE5EE;--bg:#F4F7FA;--gold:#C8962A;--gold2:#F0C060;--silver:#8090A8}
    html{scroll-behavior:smooth}
    body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--body);line-height:1.65;min-height:100vh}

    /* DEMO BAR */
    .demo-bar{background:var(--ink);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:1000;border-bottom:2px solid rgba(58,171,222,0.3)}
    .demo-bar-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);white-space:nowrap}
    .biz-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
    .biz-pill{padding:5px 12px;font-size:.72rem;font-weight:600;color:rgba(255,255,255,.55);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:4px;cursor:pointer;transition:all .18s;white-space:nowrap;font-family:'Figtree',sans-serif}
    .biz-pill:hover{background:rgba(255,255,255,.13);color:#fff}
    .biz-pill.active{background:var(--blue);border-color:var(--blue);color:#fff}

    /* TIER SWITCHER */
    .tier-switcher{background:var(--white);border-bottom:1px solid var(--border);display:flex;position:sticky;top:45px;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .tier-tabs{display:flex;flex:1}
    .tier-tab{flex:1;padding:13px 16px;display:flex;flex-direction:column;align-items:center;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;transition:all .2s;font-family:'Figtree',sans-serif;gap:2px}
    .tier-tab .tt-name{font-size:.78rem;font-weight:700;letter-spacing:.04em}
    .tier-tab .tt-price{font-size:.65rem;font-weight:500;opacity:.6}
    .tier-tab .tt-dot{width:8px;height:8px;border-radius:50%;margin-bottom:2px}
    .tier-tab.gold{color:var(--gold)}.tier-tab.gold.active{border-bottom-color:var(--gold);background:#FFFBF0}.tier-tab.gold:hover:not(.active){background:#FFFDF5}.tier-tab.gold .tt-dot{background:var(--gold)}
    .tier-tab.silver{color:var(--silver)}.tier-tab.silver.active{border-bottom-color:var(--silver);background:#F5F7FA}.tier-tab.silver:hover:not(.active){background:#F8F9FB}.tier-tab.silver .tt-dot{background:var(--silver)}
    .tier-tab.bronze{color:#9A7060}.tier-tab.bronze.active{border-bottom-color:#9A7060;background:#FBF7F4}.tier-tab.bronze:hover:not(.active){background:#FDF9F7}.tier-tab.bronze .tt-dot{background:#9A7060}

    /* GOLD HERO */
    .gold-hero{background:var(--navy);min-height:300px;display:grid;grid-template-columns:1fr 400px;position:relative;overflow:hidden}
    .gold-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold))}
    .gold-hero-text{padding:44px 48px 44px 52px;position:relative;z-index:2;display:flex;flex-direction:column;justify-content:flex-end}
    .gold-hero-text::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 0% 100%,rgba(200,150,42,.12) 0%,transparent 70%)}
    .hero-breadcrumb{font-size:.72rem;color:rgba(255,255,255,.4);margin-bottom:18px;position:relative}
    .hero-breadcrumb a{color:rgba(255,255,255,.45);text-decoration:none}.hero-breadcrumb span{margin:0 5px}
    .hero-badge-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;position:relative;flex-wrap:wrap}
    .gold-spotlight-badge{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:3px}
    .menu-addon-badge{background:var(--lime);color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:3px}
    .cat-crumb{font-size:.7rem;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);padding:3px 9px;border-radius:3px}
    .gold-hero-text h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;color:#fff;line-height:1.12;margin-bottom:10px;position:relative}
    .hero-tagline{font-size:1rem;color:rgba(255,255,255,.65);margin-bottom:20px;position:relative;max-width:480px}
    .hero-meta-row{display:flex;flex-wrap:wrap;gap:14px;position:relative}
    .hero-meta-item{display:flex;align-items:center;gap:5px;font-size:.78rem;color:rgba(255,255,255,.6)}
    .rating-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:5px}
    .rating-badge .rb-stars{color:#F5C842;font-size:.75rem}.rating-badge .rb-score{color:#fff;font-weight:700;font-size:.88rem}.rating-badge .rb-count{color:rgba(255,255,255,.5);font-size:.72rem}

    /* PHOTO GRID */
    .gold-hero-photos{display:grid;grid-template-rows:1fr 1fr;grid-template-columns:1fr 1fr;gap:3px;padding:3px 3px 0}
    .photo-slot{position:relative;overflow:hidden}.photo-slot:first-child{grid-row:1/3}
    .psi{width:100%;height:100%;min-height:120px;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative}
    .pc1{background:linear-gradient(135deg,#C04030,#802818)}.pc2{background:linear-gradient(135deg,#D06828,#A04818)}.pc3{background:linear-gradient(135deg,#383830,#282820)}.pc4{background:linear-gradient(135deg,#204880,#183060)}.pc5{background:linear-gradient(135deg,#284838,#183028)}.pc6{background:linear-gradient(135deg,#583028,#382018)}.pc7{background:linear-gradient(135deg,#204060,#142840)}.pc8{background:linear-gradient(135deg,#483868,#302448)}
    .photo-label{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.6);font-size:.62rem;padding:3px 7px;border-radius:3px}
    .photo-more{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:700}

    /* GOLD BODY */
    .gold-body{max-width:1060px;margin:0 auto;padding:36px 24px 72px;display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start}
    .gold-main{min-width:0}.gold-sidebar{display:flex;flex-direction:column;gap:16px}

    /* BUTTONS */
    .btn-gold{background:linear-gradient(135deg,var(--gold),#B07820);color:#fff;font-family:'Figtree',sans-serif;font-weight:700;font-size:.85rem;padding:11px 20px;border-radius:7px;border:none;cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.02em}
    .btn-gold:hover{filter:brightness(1.1)}
    .btn-menu{background:linear-gradient(135deg,var(--lime),#5A9020);color:#fff;font-family:'Figtree',sans-serif;font-weight:700;font-size:.85rem;padding:11px 20px;border-radius:7px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:filter .2s}
    .btn-menu:hover{filter:brightness(1.1)}
    .btn-outline{background:transparent;color:var(--body);font-family:'Figtree',sans-serif;font-weight:600;font-size:.83rem;padding:11px 18px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;text-decoration:none;transition:all .2s}
    .btn-outline:hover{border-color:var(--blue);color:var(--blue)}
    .btn-navy{background:var(--navy);color:#fff;font-family:'Figtree',sans-serif;font-weight:700;font-size:.85rem;padding:11px 20px;border-radius:7px;border:none;cursor:pointer;text-decoration:none;transition:background .2s}
    .btn-navy:hover{background:var(--blue)}

    /* ACTION BAR */
    .action-bar{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
    .action-divider{flex:1}
    .social-icons{display:flex;gap:8px}
    .si{width:34px;height:34px;border-radius:7px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;text-decoration:none;transition:all .2s}
    .si:hover{background:var(--navy);border-color:var(--navy)}
    .updated-tag{font-size:.72rem;color:var(--muted);font-style:italic;margin-left:auto}

    /* CONTENT SECTIONS */
    .cs{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
    .cs-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .cs-body{font-size:.88rem;color:var(--body);line-height:1.75}
    .svcs{display:flex;flex-wrap:wrap;gap:7px}
    .svc{font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--body)}
    .hours-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
    .hr{display:flex;justify-content:space-between;padding:8px 10px;font-size:.82rem;background:var(--bg);border-radius:5px}
    .hr .day{font-weight:600;color:var(--navy)}.hr .time{color:var(--muted)}
    .hr.closed .time{color:var(--coral)}.hr.today{background:#EBF8ED}.hr.today .day,.hr.today .time{color:#1A7A42;font-weight:700}
    .map-ph{background:linear-gradient(135deg,#E8F0F8,#D8E4F0);border-radius:8px;height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:.83rem;border:1px solid var(--border)}
    .rv{background:var(--bg);border-radius:8px;padding:14px;border-left:3px solid var(--gold);margin-bottom:10px}
    .rv-stars{color:#F5C842;font-size:.8rem;margin-bottom:5px}.rv-text{font-size:.83rem;color:var(--body);line-height:1.55;font-style:italic;margin-bottom:6px}.rv-author{font-size:.72rem;color:var(--muted)}

    /* SIDEBAR */
    .sc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px}
    .sc h4{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:12px}
    .cl{display:flex;flex-direction:column;gap:9px}
    .ci{display:flex;gap:10px;font-size:.83rem}
    .ci .ci-i{flex-shrink:0;font-size:.9rem;margin-top:1px}.ci .ci-t{color:var(--muted)}.ci .ci-t a{color:var(--blue);text-decoration:none}
    .ci .ci-t strong{color:var(--body);display:block;font-size:.75rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1px}
    .gold-sc{background:linear-gradient(135deg,var(--navy),#1A2A40);border-radius:10px;padding:18px;border:1px solid rgba(200,150,42,.3)}
    .gold-sc h4{color:var(--gold2);font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
    .gold-sc p{color:rgba(255,255,255,.55);font-size:.78rem;line-height:1.55;margin-bottom:12px}
    .gold-sc a{display:block;background:linear-gradient(135deg,var(--gold),#A07020);color:#fff;font-family:'Figtree',sans-serif;font-weight:700;font-size:.78rem;padding:9px 14px;border-radius:5px;text-decoration:none;text-align:center}

    /* MENU TEASER (gold) */
    .mts{background:linear-gradient(135deg,#F0FAF0,#E4F5E4);border:1px solid #A8D8A8;border-radius:10px;padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s}
    .mts:hover{border-color:var(--lime);box-shadow:0 2px 12px rgba(125,193,67,.15)}
    .mts-icon{font-size:1.8rem;flex-shrink:0}
    .mts-txt{flex:1}.mts-txt h4{font-size:.92rem;font-weight:700;color:#2A6020;margin-bottom:3px}.mts-txt p{font-size:.78rem;color:#4A8040;line-height:1.45}
    .mts-arrow{font-size:1.1rem;color:var(--lime);flex-shrink:0}
    .mts-upd{font-size:.68rem;color:#4A8040;background:rgba(125,193,67,.15);padding:2px 8px;border-radius:10px;white-space:nowrap}

    /* MENU TEASER (silver — blurred preview) */
    .mpw{margin-top:14px;display:flex;flex-direction:column;gap:6px;position:relative}
    .mpr{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:7px;font-size:.83rem}
    .mpr .mpn{font-weight:600;color:var(--navy)}.mpr .mpp{color:var(--muted);font-weight:600}
    .mpr.blur{filter:blur(3px);pointer-events:none;user-select:none}
    .mpf{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to bottom,transparent,var(--white));border-radius:0 0 7px 7px}
    .smu{background:linear-gradient(135deg,#FFFAF0,#FFF5DC);border:1px solid rgba(200,150,42,.3);border-radius:10px;padding:16px 18px;margin-top:14px}
    .smu-eye{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
    .smu-h{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:#7A5010;margin-bottom:5px}
    .smu-p{font-size:.78rem;color:#9A7030;line-height:1.5;margin-bottom:10px}
    .smu-btn{display:inline-block;background:linear-gradient(135deg,var(--gold),#A07020);color:#fff;font-family:'Figtree',sans-serif;font-size:.75rem;font-weight:700;padding:7px 14px;border-radius:4px;text-decoration:none}

    /* SILVER */
    .silver-header{background:var(--white);border-bottom:1px solid var(--border);padding:28px 0 0}
    .silver-inner{max-width:1000px;margin:0 auto;padding:0 24px}
    .silver-badge{background:linear-gradient(135deg,var(--silver),#A0B0C8);color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px}
    .silver-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;color:var(--navy);margin-bottom:8px}
    .silver-meta{display:flex;flex-wrap:wrap;gap:16px;padding-bottom:20px;border-bottom:3px solid var(--silver)}
    .silver-mi{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted)}
    .silver-body{max-width:1000px;margin:0 auto;padding:28px 24px 64px;display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}
    .silver-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .utg{background:linear-gradient(135deg,#FFFAF0,#FFF5DC);border:1px solid rgba(200,150,42,.3);border-radius:10px;padding:16px;margin-bottom:16px}
    .utg-eye{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
    .utg h4{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:#7A5010;margin-bottom:5px}
    .utg p{font-size:.78rem;color:#9A7030;line-height:1.5;margin-bottom:10px}
    .utg ul{list-style:none;display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
    .utg li{font-size:.74rem;color:#8A6020;padding-left:14px;position:relative}
    .utg li::before{content:'✦';position:absolute;left:0;color:var(--gold);font-size:.6rem;top:2px}
    .utg a{display:inline-block;background:linear-gradient(135deg,var(--gold),#A07020);color:#fff;font-family:'Figtree',sans-serif;font-size:.75rem;font-weight:700;padding:7px 14px;border-radius:4px;text-decoration:none}

    /* BRONZE */
    .bronze-wrap{max-width:760px;margin:40px auto;padding:0 24px}
    .bronze-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .bronze-hdr{padding:20px 22px;border-bottom:1px solid var(--border);background:#FAFBFC;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .bronze-badge{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:#F0EBE4;color:#9A7060;white-space:nowrap;flex-shrink:0}
    .bronze-hdr h1{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--navy);margin-bottom:4px}
    .bronze-meta{font-size:.78rem;color:var(--muted)}
    .bronze-body{padding:20px 22px}
    .bronze-desc{font-size:.85rem;color:var(--muted);line-height:1.65;margin-bottom:16px}
    .bronze-contacts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
    .bci{font-size:.78rem;color:var(--muted);background:var(--bg);padding:5px 10px;border-radius:5px;border:1px solid var(--border)}
    .bup{background:linear-gradient(135deg,var(--navy),#1E3050);border-radius:10px;padding:20px;text-align:center}
    .bup-eye{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
    .bup h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:8px}
    .bup p{font-size:.8rem;color:rgba(255,255,255,.55);line-height:1.55;max-width:380px;margin:0 auto 16px}
    .bup-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn-upsil{background:linear-gradient(135deg,var(--silver),#708090);color:#fff;font-family:'Figtree',sans-serif;font-weight:700;font-size:.8rem;padding:10px 18px;border-radius:5px;text-decoration:none}
    .btn-upgold{background:linear-gradient(135deg,var(--gold),#A07020);color:#fff;font-family:'Figtree',sans-serif;font-weight:700;font-size:.8rem;padding:10px 18px;border-radius:5px;text-decoration:none}
    .pc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;margin-top:24px;background:var(--border);border-radius:10px;overflow:hidden}
    .pc{background:var(--white);padding:16px 14px;display:flex;flex-direction:column;gap:8px}
    .pc.cur{background:#F5F7FA}.pc.hi{background:#FFFAF0}
    .pc-tier{font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
    .pc-price{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--navy);line-height:1}
    .pc-price span{font-size:.75rem;font-weight:400;color:var(--muted)}
    .pc-fl{list-style:none;display:flex;flex-direction:column;gap:4px}
    .pc-fl li{font-size:.73rem;color:var(--muted);padding-left:13px;position:relative}
    .pc-fl li::before{content:'✓';position:absolute;left:0;font-size:.65rem;color:var(--lime)}
    .pc-fl li.no::before{content:'✗';color:#ccc}.pc-fl li.no{color:#bbb}

    /* LIGHTBOX */
    .lb-ov{position:fixed;inset:0;background:rgba(10,20,35,.75);backdrop-filter:blur(4px);z-index:9000;display:none;align-items:flex-end;justify-content:center}
    .lb-ov.open{display:flex;animation:ovIn .25s ease both}
    @keyframes ovIn{from{opacity:0}to{opacity:1}}
    .lb-sheet{background:var(--white);width:100%;max-width:760px;max-height:92vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:shUp .3s cubic-bezier(.22,1,.36,1) both;box-shadow:0 -8px 60px rgba(0,0,0,.3)}
    @keyframes shUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    .lb-hdr{padding:18px 22px 0;flex-shrink:0}
    .lb-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
    .lb-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .lb-tblk h2{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--navy);margin-bottom:3px}
    .lb-sub{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .lb-upd{font-size:.68rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
    .lb-close{width:34px;height:34px;background:var(--bg);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;transition:background .2s;font-family:'Figtree',sans-serif}
    .lb-close:hover{background:var(--border)}
    .lb-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 22px;border-bottom:1px solid var(--border);flex-shrink:0}
    .lb-tabs::-webkit-scrollbar{display:none}
    .lb-tab{padding:10px 16px;font-size:.8rem;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;font-family:'Figtree',sans-serif;background:none;border-top:none;border-left:none;border-right:none}

  const biz=B[cb];const items=(biz.md||{})[lbTab]||[];
  const filtered=items.filter(it=>{
    if(lbF.has('All'))return true;
    for(const f of lbF){const bk=FB[f];if(!bk)return true;if(it.b.includes(bk))return true}
    return false;
  });
  if(!filtered.length){document.getElementById('lb-scroll').innerHTML=`<div class="no-res"><div class="nri">🔍</div><p>No items match that filter.</p><button onclick="lbF=new Set(['All']);rLBFilters();rLBItems()" style="margin-top:10px;padding:7px 16px;background:var(--navy);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.8rem">Show all</button></div>`;return}
  document.getElementById('lb-scroll').innerHTML=`<div class="mi-list">${filtered.map(it=>`<div class="mi"><div class="mi-l"><div class="mi-nr"><span class="mi-n">${it.n}</span>${bH(it.b)}</div><p class="mi-d">${it.d}</p></div><div class="mi-r"><span class="mi-p">${it.p}</span></div></div>`).join('')}</div>`
}

render();
</script>
