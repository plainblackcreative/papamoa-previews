<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Page Template | Papamoa.info</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #2B3F5C;
      --blue:   #3AABDE;
      --lime:   #7DC143;
      --sand:   #F5EFE0;
      --dune:   #D4C4A0;
      --coral:  #E8344A;
      --white:  #FFFFFF;
      --ink:    #0D1B2A;
      --body:   #1E2D3E;
      --muted:  #607080;
      --border: #DDE5EE;
      --bg:     #F4F7FA;
      --gold:   #C8962A;
      --gold2:  #F0C060;
      --silver: #8090A8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--body);
      line-height: 1.65;
      min-height: 100vh;
    }

    /* =====================================================
       DEMO CONTROLS — TOP BAR
    ===================================================== */
    .demo-bar {
      background: var(--ink);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(58,171,222,0.3);
    }

    .demo-bar-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }

    .biz-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .biz-pill {
      padding: 5px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .biz-pill:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .biz-pill.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* =====================================================
       TIER SWITCHER — STICKY
    ===================================================== */
    .tier-switcher {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      position: sticky;
      top: 45px;
      z-index: 999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .tier-tabs {
      display: flex;
      flex: 1;
    }

    .tier-tab {
      flex: 1;
      padding: 13px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      font-family: 'Figtree', sans-serif;
      gap: 2px;
    }

    .tier-tab .tt-name {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .tier-tab .tt-price {
      font-size: 0.65rem;
      font-weight: 500;
      opacity: 0.6;
    }

    /* GOLD tab */
    .tier-tab.gold { color: var(--gold); }
    .tier-tab.gold.active { border-bottom-color: var(--gold); background: #FFFBF0; }
    .tier-tab.gold:hover:not(.active) { background: #FFFDF5; }

    /* SILVER tab */
    .tier-tab.silver { color: var(--silver); }
    .tier-tab.silver.active { border-bottom-color: var(--silver); background: #F5F7FA; }
    .tier-tab.silver:hover:not(.active) { background: #F8F9FB; }

    /* BRONZE tab */
    .tier-tab.bronze { color: #9A7060; }
    .tier-tab.bronze.active { border-bottom-color: #9A7060; background: #FBF7F4; }
    .tier-tab.bronze:hover:not(.active) { background: #FDF9F7; }

    .tier-tab .tt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-bottom: 2px;
    }

    .tier-tab.gold .tt-dot { background: var(--gold); }
    .tier-tab.silver .tt-dot { background: var(--silver); }
    .tier-tab.bronze .tt-dot { background: #9A7060; }

    /* =====================================================
       TIER PANELS
    ===================================================== */
    .tier-panel { display: none; }
    .tier-panel.active { display: block; }

    /* =====================================================
       GOLD LAYOUT
    ===================================================== */

    /* Hero */
    .gold-hero {
      background: var(--navy);
      min-height: 320px;
      display: grid;
      grid-template-columns: 1fr 400px;
      position: relative;
      overflow: hidden;
    }

    .gold-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
    }

    .gold-hero-text {
      padding: 44px 48px 44px 52px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .gold-hero-text::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 0% 100%, rgba(200,150,42,0.12) 0%, transparent 70%);
    }

    .hero-breadcrumb {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 18px;
      position: relative;
    }

    .hero-breadcrumb a { color: rgba(255,255,255,0.45); text-decoration: none; }
    .hero-breadcrumb span { margin: 0 5px; }

    .hero-badge-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
    }

    .gold-spotlight-badge {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--ink);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
    }

    .cat-breadcrumb-badge {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.08);
      padding: 3px 9px;
      border-radius: 3px;
    }

    .gold-hero-text h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.12;
      margin-bottom: 10px;
      position: relative;
    }

    .hero-tagline {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      margin-bottom: 20px;
      position: relative;
      max-width: 480px;
    }

    .hero-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      position: relative;
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
    }

    /* Photo gallery panel */
    .gold-hero-photos {
      display: grid;
      grid-template-rows: 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      padding: 3px 3px 0 3px;
    }

    .photo-slot {
      position: relative;
      overflow: hidden;
    }

    .photo-slot:first-child {
      grid-row: 1 / 3;
    }

    .photo-slot-inner {
      width: 100%;
      height: 100%;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      position: relative;
    }

    /* Each listing gets its own photo colour scheme */
    .photo-c1 { background: linear-gradient(135deg, #C04030, #802818); }
    .photo-c2 { background: linear-gradient(135deg, #D06828, #A04818); }
    .photo-c3 { background: linear-gradient(135deg, #383830, #282820); }
    .photo-c4 { background: linear-gradient(135deg, #204880, #183060); }
    .photo-c5 { background: linear-gradient(135deg, #284838, #183028); }
    .photo-c6 { background: linear-gradient(135deg, #583028, #382018); }
    .photo-c7 { background: linear-gradient(135deg, #204060, #142840); }
    .photo-c8 { background: linear-gradient(135deg, #483868, #302448); }

    .photo-label {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.6);
      font-size: 0.62rem;
      padding: 3px 7px;
      border-radius: 3px;
    }

    .photo-more {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* Rating badge */
    .rating-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 5px 12px;
      border-radius: 5px;
    }

    .rating-badge .rb-stars { color: #F5C842; font-size: 0.75rem; }
    .rating-badge .rb-score { color: #fff; font-weight: 700; font-size: 0.88rem; }
    .rating-badge .rb-count { color: rgba(255,255,255,0.5); font-size: 0.72rem; }

    /* Gold body */
    .gold-body {
      max-width: 1060px;
      margin: 0 auto;
      padding: 36px 24px 72px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 28px;
      align-items: start;
    }

    .gold-main { min-width: 0; }
    .gold-sidebar { display: flex; flex-direction: column; gap: 16px; }

    /* Action bar */
    .gold-action-bar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    .btn-primary-gold {
      background: linear-gradient(135deg, var(--gold), #B07820);
      color: var(--white);
      font-family: 'Figtree', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 11px 20px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-primary-gold:hover { filter: brightness(1.1); }

    .btn-secondary-outline {
      background: transparent;
      color: var(--body);
      font-family: 'Figtree', sans-serif;
      font-weight: 600;
      font-size: 0.83rem;
      padding: 11px 18px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-secondary-outline:hover { border-color: var(--blue); color: var(--blue); }

    .action-divider { flex: 1; }

    .social-icons {
      display: flex;
      gap: 8px;
    }

    .social-icon {
      width: 34px; height: 34px;
      border-radius: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .social-icon:hover { background: var(--navy); border-color: var(--navy); }

    /* Content sections */
    .content-section {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .cs-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cs-body {
      font-size: 0.88rem;
      color: var(--body);
      line-height: 1.75;
    }

    /* Services pills */
    .services-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .svc-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--body);
    }

    /* Menu/hours grid */
    .hours-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
    }

    .hours-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      font-size: 0.82rem;
      background: var(--bg);
      border-radius: 5px;
    }

    .hours-row .day { font-weight: 600; color: var(--navy); }
    .hours-row .time { color: var(--muted); }
    .hours-row.closed .time { color: var(--coral); }
    .hours-row.today { background: #EBF8ED; }
    .hours-row.today .day, .hours-row.today .time { color: #1A7A42; font-weight: 700; }

    /* Map placeholder */
    .map-placeholder {
      background: linear-gradient(135deg, #E8F0F8 0%, #D8E4F0 100%);
      border-radius: 8px;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.83rem;
      border: 1px solid var(--border);
    }

    .map-placeholder .map-icon { font-size: 2rem; }

    /* Sidebar cards */
    .sidebar-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .sidebar-card h4 {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .contact-item {
      display: flex;
      gap: 10px;
      font-size: 0.83rem;
    }

    .contact-item .ci-icon { flex-shrink: 0; font-size: 0.9rem; margin-top: 1px; }
    .contact-item .ci-text { color: var(--muted); }
    .contact-item .ci-text a { color: var(--blue); text-decoration: none; }
    .contact-item .ci-text strong { color: var(--body); display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 1px; }

    /* Gold sidebar special */
    .gold-spotlight-card {
      background: linear-gradient(135deg, var(--navy), #1A2A40);
      border-radius: 10px;
      padding: 18px;
      border: 1px solid rgba(200,150,42,0.3);
    }

    .gold-spotlight-card h4 {
      color: var(--gold2);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .gold-spotlight-card p {
      color: rgba(255,255,255,0.55);
      font-size: 0.78rem;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .gold-spotlight-card .btn-upgrade {
      display: block;
      background: linear-gradient(135deg, var(--gold), #A07020);
      color: var(--white);
      font-family: 'Figtree', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 9px 14px;
      border-radius: 5px;
      text-decoration: none;
      text-align: center;
      transition: filter 0.2s;
    }

    /* =====================================================
       SILVER LAYOUT
    ===================================================== */
    .silver-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 28px 0 0;
    }

    .silver-header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .silver-badge-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .silver-badge {
      background: linear-gradient(135deg, var(--silver), #A0B0C8);
      color: var(--white);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 3px;
    }

    .silver-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .silver-header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding-bottom: 20px;
      border-bottom: 3px solid var(--silver);
    }

    .silver-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .silver-body {
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 24px 64px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    .silver-action-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .btn-primary-silver {
      background: var(--navy);
      color: var(--white);
      font-family: 'Figtree', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 11px 20px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-primary-silver:hover { background: var(--blue); }

    /* Silver upgrade prompt */
    .upgrade-to-gold {
      background: linear-gradient(135deg, #FFFAF0, #FFF5DC);
      border: 1px solid rgba(200,150,42,0.3);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .upgrade-to-gold .utg-eyebrow {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 5px;
    }

    .upgrade-to-gold h4 {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #7A5010;
      margin-bottom: 5px;
    }

    .upgrade-to-gold p {
      font-size: 0.78rem;
      color: #9A7030;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .upgrade-to-gold .utg-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px;
    }

    .upgrade-to-gold .utg-features li {
      font-size: 0.74rem;
      color: #8A6020;
      padding-left: 14px;
      position: relative;
    }

    .upgrade-to-gold .utg-features li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 0.6rem;
      top: 2px;
    }

    .upgrade-to-gold a {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), #A07020);
      color: #fff;
      font-family: 'Figtree', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 4px;
      text-decoration: none;
    }

    /* =====================================================
       BRONZE LAYOUT
    ===================================================== */
    .bronze-wrap {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .bronze-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .bronze-header {
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
      background: #FAFBFC;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .bronze-badge {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 3px;
      background: #F0EBE4;
      color: #9A7060;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .bronze-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .bronze-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .bronze-body {
      padding: 20px 22px;
    }

    .bronze-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .bronze-contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .bronze-contact-item {
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--bg);
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
    }

    .bronze-upgrade {
      background: linear-gradient(135deg, var(--navy), #1E3050);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .bronze-upgrade .bu-eyebrow {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .bronze-upgrade h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .bronze-upgrade p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);

    review: { text: 'This Gold Spotlight position is available for one Pāpāmoa-focused real estate agent or agency. $1,200 + GST per year, Founding Member rate.', author: 'Papamoa.info — listing available' },
  },
};

let currentBiz = 'pizza';
let currentTier = 'gold';

// ============================================================
// TIER SWITCHER
// ============================================================
function setTier(tier) {
  currentTier = tier;
  document.querySelectorAll('.tier-tab').forEach(t => {
    t.classList.toggle('active', t.classList.contains(tier));
  });
  renderListing();
}

function showBiz(biz) {
  currentBiz = biz;
  document.querySelectorAll('.biz-pill').forEach(p => {
    p.classList.toggle('active', p.getAttribute('onclick').includes(`'${biz}'`));
  });
  renderListing();
}

// ============================================================
// RENDER
// ============================================================
function renderListing() {
  const biz = businesses[currentBiz];
  const container = document.getElementById('listing-content');

  if (currentTier === 'gold') container.innerHTML = renderGold(biz);
  else if (currentTier === 'silver') container.innerHTML = renderSilver(biz);
  else container.innerHTML = renderBronze(biz);
}

// ============================================================
// GOLD
// ============================================================
function renderGold(biz) {

  const servicesHTML = (biz.services || []).map(s => `<span class="svc-pill">${s}</span>`).join('');

      <span class="ci-icon">✦</span>

  const reviewHTML = biz.review ? `

    biz.facebook ? `<a href="#" class="social-icon" title="Facebook">f</a>` : '',

    <!-- HERO -->

        <div class="hero-breadcrumb">

        <div class="hero-meta-row">

        </div>
        <div class="photo-slot">

            ${biz.photos[1] || biz.emoji}

        </div>
        <div class="photo-slot" style="position:relative;">
          <div class="photo-slot-inner ${biz.colorClass}" style="opacity:0.6;font-size:2rem;">
            ${biz.photos[2] || biz.emoji}

          <div class="photo-more">+6 photos</div>
        </div>

    </div>

    <!-- BODY -->
    <div class="gold-body">
      <div class="gold-main">

        <!-- ACTION BAR -->

          ${biz.phone && biz.phone !== 'See order platforms' && biz.phone !== 'See individual agents'

    </div>
  </div>`;
}
