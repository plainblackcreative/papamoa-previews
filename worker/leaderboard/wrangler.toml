name = "papamoa-leaderboard"
main = "src/index.js"
compatibility_date = "2024-10-01"

# KV namespace — created via:
#   npx wrangler kv namespace create LEADERBOARD_KV
# then paste the returned `id` below.
[[kv_namespaces]]
binding = "LEADERBOARD_KV"
id = "31aa1df0e4f342389a2c7adc7cd7ac47"

# Origins allowed by CORS.
[vars]
ALLOWED_ORIGINS = "https://www.papamoa.info,https://papamoa.info,http://localhost:8765"

# No secrets needed — leaderboard is public read + rate-limited write.
